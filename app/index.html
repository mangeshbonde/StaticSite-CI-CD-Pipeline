<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VerdantVerse Books</title>

<style>
:root {
    --dark: #091413;
    --deep: #285a48;
    --mid: #408a71;
    --light: #b0e4cc;
    --glow: #66ffcc;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: var(--dark);
    color: var(--light);
}

/* NAVBAR */
nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 40px;
    background: rgba(40, 90, 72, 0.3);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(176,228,204,0.2);
}

.logo {
    font-size: 24px;
    font-weight: bold;
    color: var(--glow);
    text-shadow: 0 0 10px var(--glow);
}

.search {
    padding: 8px 12px;
    border-radius: 8px;
    border: none;
    outline: none;
    background: var(--deep);
    color: white;
}

/* HERO */
.hero {
    text-align: center;
    padding: 60px 20px;
}

.hero h1 {
    font-size: 40px;
    color: var(--glow);
    text-shadow: 0 0 20px var(--glow);
}

.hero p {
    margin-top: 10px;
    color: var(--light);
}

/* BOOK GRID */
.books {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 25px;
    padding: 40px;
}

/* CARD */
.book {
    background: rgba(40, 90, 72, 0.2);
    backdrop-filter: blur(15px);
    border-radius: 15px;
    padding: 20px;
    text-align: center;
    border: 1px solid rgba(176,228,204,0.2);
    transition: 0.4s ease;
}

.book:hover {
    transform: translateY(-10px) scale(1.03);
    box-shadow: 0 0 20px var(--glow), 0 0 40px rgba(102,255,204,0.4);
}

/* BOOK TITLE */
.book h3 {
    margin-bottom: 10px;
    color: white;
}

/* PRICE */
.price {
    color: var(--glow);
    font-weight: bold;
    margin-bottom: 15px;
}

/* BUTTON */
.btn {
    background: var(--mid);
    border: none;
    padding: 10px 15px;
    border-radius: 8px;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    background: var(--glow);
    color: black;
    box-shadow: 0 0 15px var(--glow);
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    background: var(--deep);
    margin-top: 30px;
    color: var(--light);
}
</style>
</head>

<body>

<nav>
    <div class="logo">📚 VerdantVerses</div>
    <input type="text" class="search" placeholder="Search books...">
</nav>

<section class="hero">
    <h1>Step Into the VerdantVerses</h1>
    <p>Where knowledge glows in every shade of green</p>
</section>

<section class="books">

    <div class="book">
        <h3>AWS Cloud Mastery</h3>
        <p class="price">₹799</p>
        <button class="btn">Buy Now</button>
    </div>

    <div class="book">
        <h3>Kubernetes Guide</h3>
        <p class="price">₹699</p>
        <button class="btn">Buy Now</button>
    </div>

    <div class="book">
        <h3>Docker Deep Dive</h3>
        <p class="price">₹599</p>
        <button class="btn">Buy Now</button>
    </div>

    <div class="book">
        <h3>Linux Essentials</h3>
        <p class="price">₹499</p>
        <button class="btn">Buy Now</button>
    </div>

</section>

<footer>
    © 2026 VerdantVerses Books
</footer>

</body>
</html>
